# /etc/nginx/sites-available/prompts.lionsystems.com.mx
# Desplegado: 2026-04-10
# Servidor: GCP 34.51.112.6:2288
# SSL: Let's Encrypt (certbot), expira 2026-07-10, renovacion automatica

server {
    server_name prompts.lionsystems.com.mx;

    root /var/www/prompts;
    index index.html;

    # Sitio estatico SPA (self-contained)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compresion
    gzip on;
    gzip_types text/html text/css application/javascript application/json text/plain;

    access_log /var/log/nginx/prompts.access.log;
    error_log  /var/log/nginx/prompts.error.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/prompts.lionsystems.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prompts.lionsystems.com.mx/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = prompts.lionsystems.com.mx) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name prompts.lionsystems.com.mx;
    return 404;
}
