name: Build & Deploy AI-SDLC Prompts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:

# ============================================================
#  JOB 1 - BUILD
#  Si verify_clean.py falla -> ambos deploys se cancelan.
# ============================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build index.html
        run: python build.py

      - name: QA gate - validate prompts
        run: python verify_clean.py

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp index.html dist/index.html

      - name: Upload artifact (shared by Pages and GCP)
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/index.html
          retention-days: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

# ============================================================
#  JOB 2 - GITHUB PAGES  (staging / ambiente de pruebas)
# ============================================================
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (staging)
        id: deployment
        uses: actions/deploy-pages@v4

# ============================================================
#  JOB 3 - GCP  (produccion)
#  Avanza solo si build + deploy-pages pasaron.
#  Secrets del environment 'production':
#    GCP_SSH_KEY   -> clave privada RSA
#    GCP_KNOWN_HOST -> fingerprint ECDSA del servidor
#    GCP_HOST, GCP_USER, GCP_PORT, GCP_DEPLOY_PATH
# ============================================================
  deploy-gcp:
    needs: [build, deploy-pages]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://prompts.lionsystems.com.mx
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: dist

      - name: Configure SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
          GCP_KNOWN_HOST: ${{ secrets.GCP_KNOWN_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$GCP_KNOWN_HOST" >> ~/.ssh/known_hosts
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/gcp_key
          chmod 600 ~/.ssh/gcp_key

      - name: Transfer to GCP staging path
        env:
          H: ${{ secrets.GCP_HOST }}
          U: ${{ secrets.GCP_USER }}
          P: ${{ secrets.GCP_PORT }}
        run: |
          scp -P "$P" -i ~/.ssh/gcp_key -o BatchMode=yes \
              dist/index.html "${U}@${H}:/home/${U}/index.html.new"

      - name: Atomic replace in production dir
        env:
          H: ${{ secrets.GCP_HOST }}
          U: ${{ secrets.GCP_USER }}
          P: ${{ secrets.GCP_PORT }}
          D: ${{ secrets.GCP_DEPLOY_PATH }}
        run: |
          CMD="set -e"
          CMD="${CMD}; sudo cp /home/${U}/index.html.new ${D}/index.html"
          CMD="${CMD}; sudo chown www-data:www-data ${D}/index.html"
          CMD="${CMD}; sudo chmod 644 ${D}/index.html"
          CMD="${CMD}; rm -f /home/${U}/index.html.new"
          CMD="${CMD}; echo DEPLOY_PROD_OK"
          CMD="${CMD}; stat ${D}/index.html"
          ssh -p "$P" -i ~/.ssh/gcp_key -o BatchMode=yes "${U}@${H}" "$CMD"

      - name: Smoke test GCP production
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              https://prompts.lionsystems.com.mx)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "ERROR: HTTP $STATUS"; exit 1; }
          COUNT=$(curl -s --max-time 20 https://prompts.lionsystems.com.mx \
              | grep -c 'class="card"' || true)
          echo "Cards en produccion: $COUNT"
          [ "$COUNT" -ge 44 ] || { echo "ERROR: esperadas >=44, encontradas $COUNT"; exit 1; }
          echo "SMOKE_OK: $COUNT cards verificadas"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/gcp_key
