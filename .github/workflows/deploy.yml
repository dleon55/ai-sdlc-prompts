name: Build & Deploy AI-SDLC Prompts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: false

jobs:

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
#  JOB 1 â€” BUILD (fuente Ãºnica de verdad)
#  Si verify_clean.py falla â†’ ambos deploys se cancelan
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build index.html
        run: python build.py

      - name: QA gate â€” validate prompts
        run: python verify_clean.py

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp index.html dist/index.html

      - name: Upload artifact (shared by both deploy jobs)
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/index.html
          retention-days: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
#  JOB 2 â€” GITHUB PAGES (staging / pruebas)
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (staging)
        id: deployment
        uses: actions/deploy-pages@v4

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
#  JOB 3 â€” GCP (producciÃ³n)
#  SÃ³lo avanza si build + deploy-pages fueron exitosos.
#  Secretos del environment "production": GCP_SSH_KEY, GCP_KNOWN_HOST,
#  GCP_HOST, GCP_USER, GCP_PORT, GCP_DEPLOY_PATH.
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  deploy-gcp:
    needs: [build, deploy-pages]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://prompts.lionsystems.com.mx
    env:
      GCP_HOST: ${{ secrets.GCP_HOST }}
      GCP_USER: ${{ secrets.GCP_USER }}
      GCP_PORT: ${{ secrets.GCP_PORT }}
      GCP_DEPLOY_PATH: ${{ secrets.GCP_DEPLOY_PATH }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: dist

      - name: Configure SSH
        shell: bash
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
          GCP_KNOWN_HOST: ${{ secrets.GCP_KNOWN_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$GCP_KNOWN_HOST" >> ~/.ssh/known_hosts
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/gcp_key
          chmod 600 ~/.ssh/gcp_key

      - name: Transfer index.html to GCP staging path
        shell: bash
        run: |
          scp -P "$GCP_PORT" \
              -i ~/.ssh/gcp_key \
              -o BatchMode=yes \
              dist/index.html \
              "${GCP_USER}@${GCP_HOST}:/home/${GCP_USER}/index.html.new"

      - name: Atomic replace in production dir
        shell: bash
        run: |
          ssh -p "$GCP_PORT" \
              -i ~/.ssh/gcp_key \
              -o BatchMode=yes \
              "${GCP_USER}@${GCP_HOST}" \
              "set -e
               sudo cp /home/${GCP_USER}/index.html.new ${GCP_DEPLOY_PATH}/index.html
               sudo chown www-data:www-data ${GCP_DEPLOY_PATH}/index.html
               sudo chmod 644 ${GCP_DEPLOY_PATH}/index.html
               rm -f /home/${GCP_USER}/index.html.new
               echo DEPLOY_PROD_OK
               stat -c '%y %s' ${GCP_DEPLOY_PATH}/index.html"

      - name: Smoke test â€” GCP production
        shell: bash
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://prompts.lionsystems.com.mx)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: producciÃ³n retornÃ³ HTTP $STATUS" && exit 1
          fi
          COUNT=$(curl -s --max-time 20 https://prompts.lionsystems.com.mx | grep -c 'class="card"' || true)
          echo "Cards verificadas en producciÃ³n: $COUNT"
          if [ "$COUNT" -lt 44 ]; then
            echo "ERROR: se esperaban >= 44 cards, encontradas $COUNT" && exit 1
          fi
          echo "SMOKE_OK: $COUNT cards en producciÃ³n"

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: rm -f ~/.ssh/gcp_key
